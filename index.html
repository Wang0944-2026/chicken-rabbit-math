<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雞兔同籠數學闖關</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: { 'fade-in': 'fadeIn 0.5s ease-out forwards' },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <!-- 引入 React 核心庫 -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 以在瀏覽器編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-green-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // === 將 Lucide-React 圖示轉換為內建 SVG 元件 ===
        const Trophy = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>
        );
        const RefreshCcw = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        );
        const ArrowRight = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        );
        const CheckCircle2 = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
        );
        const Hand = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/><path d="M6 11V9a2 2 0 0 1 2-2"/></svg>
        );
        const BookOpen = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        );
        const AlertCircle = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        );
        const HelpCircle = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        );

        // === 關卡與題目設定 ===
        const PLAY_LEVELS = [
          { targetAnimals: 4, targetLegs: 12 }, // 2雞2兔
          { targetAnimals: 5, targetLegs: 14 }, // 3雞2兔
          { targetAnimals: 6, targetLegs: 16 }, // 4雞2兔
          { targetAnimals: 8, targetLegs: 22 }, // 5雞3兔
          { targetAnimals: 10, targetLegs: 28 } // 6雞4兔
        ];

        const TEST_QUESTIONS = [
          {
            type: 'equation',
            title: '🌟 第一關：完成算式',
            text: '農場裡有雞和兔子共 7 隻，總腳數是 22 隻。請完成底下的算式。',
            total: 7, targetLegs: 22,
            ans1: 3, ans2: 4, // 3雞4兔
            label1: '雞', label2: '兔', unit1: '腳', unit2: '腳', val1: 2, val2: 4, icon1: '🐔', icon2: '🐰'
          },
          {
            type: 'text',
            title: '🌟 第二關：應用挑戰',
            text: '王爺爺的農場養了雞和兔子共 9 隻，數一數共有 26 隻腳。請問雞和兔子各有幾隻？',
            total: 9, targetLegs: 26,
            ans1: 5, ans2: 4, // 5雞4兔
            label1: '雞', label2: '兔', unit1: '腳', unit2: '腳', val1: 2, val2: 4, icon1: '🐔', icon2: '🐰'
          },
          {
            type: 'transfer',
            title: '🌟 第三關：生活應用',
            text: '停車場裡有「兩輪摩托車」和「四輪汽車」共 8 輛，輪子總共有 26 個。請問摩托車和汽車各有幾輛？',
            total: 8, targetLegs: 26,
            ans1: 3, ans2: 5, // 3摩托5汽車
            label1: '摩托車', label2: '汽車', unit1: '輪', unit2: '輪', val1: 2, val2: 4, icon1: '🏍️', icon2: '🚗'
          }
        ];

        // === 課前探索區元件 ===
        const TutorialSection = ({ onStartGame }) => {
          const [slots, setSlots] = useState(['chicken', 'chicken', 'chicken', 'chicken']);

          const chickenCount = slots.filter(animal => animal === 'chicken').length;
          const rabbitCount = slots.filter(animal => animal === 'rabbit').length;
          const totalLegs = chickenCount * 2 + rabbitCount * 4;

          const addAnimal = () => {
            if (slots.length < 10) setSlots([...slots, 'chicken']);
          };

          const removeAnimal = () => {
            if (slots.length > 4) setSlots(slots.slice(0, -1));
          };

          const handleSlotClick = (index) => {
            const newSlots = [...slots];
            newSlots[index] = newSlots[index] === 'chicken' ? 'rabbit' : 'chicken';
            setSlots(newSlots);
          };

          const getDynamicStyles = (count) => {
            if (count <= 5) return { card: "w-20 sm:w-28 h-28 sm:h-36 border-4", emoji: "text-4xl sm:text-5xl", text: "text-xs sm:text-base", gap: "gap-2" };
            if (count <= 7) return { card: "w-14 sm:w-20 h-20 sm:h-28 border-[3px]", emoji: "text-3xl sm:text-4xl", text: "text-[10px] sm:text-sm leading-tight", gap: "gap-1 sm:gap-2" };
            if (count <= 9) return { card: "w-11 sm:w-16 h-16 sm:h-24 border-2", emoji: "text-2xl sm:text-3xl", text: "text-[9px] sm:text-xs leading-tight", gap: "gap-1" };
            return { card: "w-9 sm:w-14 h-14 sm:h-20 border-2", emoji: "text-xl sm:text-2xl", text: "text-[8px] sm:text-[10px] leading-tight", gap: "gap-0.5 sm:gap-1" };
          };

          const dynamicStyles = getDynamicStyles(slots.length);

          return (
            <div className="p-4 sm:p-6 space-y-3 sm:space-y-4 animate-fade-in bg-slate-50 border-b-4 border-slate-200">
              <div className="text-center space-y-1">
                <h2 className="text-xl sm:text-2xl font-bold text-slate-700 flex items-center justify-center gap-2">
                  <Hand className="text-blue-500" /> 闖關前：動手換換看！
                </h2>
                <p className="text-sm sm:text-base text-slate-500 font-medium">試著點擊農場裡的卡牌進行替換，觀察總腳數會怎麼變化？</p>
              </div>

              <div className="bg-green-100 p-3 sm:p-5 rounded-2xl border-4 border-green-300 max-w-2xl mx-auto shadow-inner">
                <div className="flex flex-col sm:flex-row justify-between items-center mb-3 sm:mb-4 gap-2 sm:gap-4">
                  <div className="flex items-center gap-1 bg-green-200 rounded-full p-1 border-2 border-green-300 shadow-sm">
                    <button onClick={removeAnimal} disabled={slots.length <= 4} className="w-8 h-8 flex items-center justify-center bg-white rounded-full text-green-700 font-black shadow-sm disabled:opacity-50 hover:bg-green-50 transition-colors" title="減少1隻">-1</button>
                    <span className="font-bold text-green-800 text-base sm:text-lg px-2 whitespace-nowrap">農場裡的動物：{slots.length} 隻</span>
                    <button onClick={addAnimal} disabled={slots.length >= 10} className="w-8 h-8 flex items-center justify-center bg-white rounded-full text-green-700 font-black shadow-sm disabled:opacity-50 hover:bg-green-50 transition-colors" title="增加1隻">+1</button>
                  </div>
                  <span className="bg-white px-4 sm:px-5 py-1.5 sm:py-2 rounded-full font-black text-lg sm:text-xl text-green-700 shadow-sm border-2 border-green-200 whitespace-nowrap">
                    目前總腳數：{totalLegs} 隻
                  </span>
                </div>
                
                <div className="flex flex-nowrap justify-center gap-1 sm:gap-2 mb-3 sm:mb-4 w-full overflow-x-auto pb-2 px-1">
                  {slots.map((animal, index) => (
                    <div key={index} onClick={() => handleSlotClick(index)} className={`${dynamicStyles.card} flex-shrink bg-white rounded-xl shadow-md cursor-pointer transition-all flex flex-col items-center justify-center ${dynamicStyles.gap} hover:scale-105 hover:shadow-lg border-slate-200`}>
                      <span className={`${dynamicStyles.emoji} transition-all`}>{animal === 'chicken' ? '🐔' : '🐰'}</span>
                      <span className={`font-bold text-slate-600 ${dynamicStyles.text} text-center transition-all`}>
                        {animal === 'chicken' ? '雞 (2腳)' : '兔 (4腳)'}
                      </span>
                    </div>
                  ))}
                </div>

                <div className="bg-white p-3 sm:p-4 rounded-xl shadow-sm border-2 border-slate-200 w-full animate-fade-in">
                  <div className="text-slate-500 font-bold mb-2 text-center flex items-center justify-center gap-2">👀 數學算式觀察區</div>
                  <div className="flex flex-nowrap justify-center items-center gap-1 sm:gap-2 text-sm sm:text-xl font-black bg-slate-50 p-2 sm:p-4 rounded-lg border border-slate-100 overflow-x-auto whitespace-nowrap">
                    <span className="text-orange-600 bg-orange-100 px-2 sm:px-3 py-1 sm:py-2 rounded-lg flex items-center gap-1 shadow-inner">
                      (<span className="text-lg sm:text-3xl mx-1">{chickenCount}</span> <span className="text-xs sm:text-base font-bold">隻雞 × 2腳</span>)
                    </span>
                    <span className="text-slate-400">+</span>
                    <span className="text-teal-600 bg-teal-100 px-2 sm:px-3 py-1 sm:py-2 rounded-lg flex items-center gap-1 shadow-inner">
                      (<span className="text-lg sm:text-3xl mx-1">{rabbitCount}</span> <span className="text-xs sm:text-base font-bold">隻兔 × 4腳</span>)
                    </span>
                    <span className="text-slate-400">=</span>
                    <span className="text-green-600 bg-green-100 px-3 sm:px-4 py-1 sm:py-2 rounded-lg text-xl sm:text-4xl shadow-inner">{totalLegs}</span>
                  </div>
                  <p className="text-center text-blue-600 text-xs sm:text-sm mt-2 font-bold bg-blue-50 py-1 sm:py-2 rounded-lg">
                    ✨ 試著點擊更換卡牌，觀察乘法括號裡的數字是怎麼變化的？
                  </p>
                </div>
              </div>

              <div className="flex justify-center pt-2">
                <button onClick={onStartGame} className="bg-gradient-to-r from-green-500 to-emerald-500 text-white px-6 sm:px-8 py-2 sm:py-3 rounded-full font-bold shadow-lg hover:shadow-xl hover:scale-105 transition-all flex items-center gap-2 text-base sm:text-lg">
                  我觀察好了，開始闖關！ <ArrowRight />
                </button>
              </div>
            </div>
          );
        };

        // === 主應用程式 ===
        function App() {
          const [gameMode, setGameMode] = useState('tutorial'); // 'tutorial', 'play', 'test', 'testComplete'
          
          // 闖關模式狀態
          const [currentLevelIndex, setCurrentLevelIndex] = useState(0);
          const [chickens, setChickens] = useState(0);
          const [rabbits, setRabbits] = useState(0);
          const [isWon, setIsWon] = useState(false);
          const [showHint, setShowHint] = useState(false);

          // 測驗模式狀態
          const [testLevel, setTestLevel] = useState(0);
          const [testAns1, setTestAns1] = useState('');
          const [testAns2, setTestAns2] = useState('');
          const [testErrorCount, setTestErrorCount] = useState(0);
          const [showScaffold, setShowScaffold] = useState(false);
          const [scaffoldVar1, setScaffoldVar1] = useState(0); // 鷹架救援的項目1數量
          const [scaffoldVar2, setScaffoldVar2] = useState(0); // 鷹架救援的項目2數量

          const level = PLAY_LEVELS[currentLevelIndex];
          const currentLegs = chickens * 2 + rabbits * 4;

          // --- 闖關模式邏輯 ---
          useEffect(() => {
            if (gameMode === 'play') initLevel(currentLevelIndex);
          }, [currentLevelIndex, gameMode]);

          const initLevel = (index) => {
            const targetA = PLAY_LEVELS[index].targetAnimals;
            setChickens(targetA);
            setRabbits(0);
            setIsWon(false);
            setShowHint(false);
          };

          useEffect(() => {
            if (gameMode === 'play' && chickens + rabbits === level.targetAnimals && currentLegs === level.targetLegs) {
              setIsWon(true);
            }
          }, [chickens, rabbits, currentLegs, level, gameMode]);

          const swapChickenForRabbit = () => { if (chickens > 0 && !isWon) { setChickens(p => p - 1); setRabbits(p => p + 1); } };
          const swapRabbitForChicken = () => { if (rabbits > 0 && !isWon) { setRabbits(p => p - 1); setChickens(p => p + 1); } };

          const nextLevel = () => {
            if (currentLevelIndex < PLAY_LEVELS.length - 1) {
              setCurrentLevelIndex(p => p + 1);
            } else {
              setGameMode('test'); // 闖關完成，進入測驗模式
              initTestLevel(0);
            }
          };

          // --- 測驗模式邏輯 ---
          const initTestLevel = (idx) => {
            setTestLevel(idx);
            setTestAns1('');
            setTestAns2('');
            setTestErrorCount(0);
            setShowScaffold(false);
            // 初始化鷹架：全部設定為第一項 (例如：全都是雞)
            setScaffoldVar1(TEST_QUESTIONS[idx].total);
            setScaffoldVar2(0);
          };

          const submitTest = () => {
            const q = TEST_QUESTIONS[testLevel];
            if (parseInt(testAns1) === q.ans1 && parseInt(testAns2) === q.ans2) {
              // 答對了
              if (testLevel < TEST_QUESTIONS.length - 1) {
                initTestLevel(testLevel + 1);
              } else {
                setGameMode('testComplete');
              }
            } else {
              // 答錯了
              setTestErrorCount(p => p + 1);
            }
          };

          // 鷹架救援內的替換邏輯
          const scaffoldSwapToVar2 = () => { if (scaffoldVar1 > 0) { setScaffoldVar1(p => p - 1); setScaffoldVar2(p => p + 1); } };
          const scaffoldSwapToVar1 = () => { if (scaffoldVar2 > 0) { setScaffoldVar2(p => p - 1); setScaffoldVar1(p => p + 1); } };

          return (
            <div className={`min-h-screen p-2 sm:p-4 font-sans text-slate-800 transition-colors duration-500 flex flex-col justify-center ${gameMode === 'test' || gameMode === 'testComplete' ? 'bg-blue-50' : 'bg-green-50'}`}>
              <div className={`max-w-4xl mx-auto w-full bg-white rounded-3xl shadow-xl overflow-hidden border-4 ${gameMode === 'test' || gameMode === 'testComplete' ? 'border-blue-200' : 'border-green-200'}`}>
                
                {/* === 頂部標題區 === */}
                <div className={`${gameMode === 'test' || gameMode === 'testComplete' ? 'bg-blue-600' : 'bg-green-500'} text-white p-4 sm:p-5 text-center relative transition-colors duration-500`}>
                  <h1 className="text-2xl sm:text-3xl md:text-4xl font-bold mb-1 sm:mb-2">
                    {gameMode === 'test' || gameMode === 'testComplete' ? '🎓 終極測驗挑戰' : '🐔 雞兔點點名 🐰'}
                  </h1>
                  <p className={`${gameMode === 'test' || gameMode === 'testComplete' ? 'text-blue-100' : 'text-green-100'} text-sm sm:text-lg`}>
                     {gameMode === 'test' ? '不用卡牌，挑戰自己列算式解出答案！' : (gameMode === 'testComplete' ? '恭喜完成所有挑戰！' : '觀察腳數變化，幫農場主人找出正確數量的雞和兔子！')}
                  </p>
                  {(gameMode === 'play' || gameMode === 'test') && (
                    <div className="absolute top-2 right-2 sm:top-4 sm:right-4 bg-white/20 px-2 py-1 sm:px-3 sm:py-1 rounded-full font-bold text-xs sm:text-base shadow-sm">
                      {gameMode === 'play' ? `第 ${currentLevelIndex + 1} / ${PLAY_LEVELS.length} 關` : `測驗 ${testLevel + 1} / ${TEST_QUESTIONS.length}`}
                    </div>
                  )}
                </div>

                {/* === 根據模式渲染內容 === */}
                {gameMode === 'tutorial' && <TutorialSection onStartGame={() => setGameMode('play')} />}

                {gameMode === 'play' && (
                  <div className="flex flex-col bg-white rounded-b-3xl">
                    {/* 闖關區主體內容 (保留您優化過的漂亮版面) */}
                    <div className="p-5 md:p-8 space-y-6">
                      <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b-2 border-slate-100 pb-4">
                        <div className="bg-amber-100 px-5 py-3 rounded-2xl border-4 border-amber-300 shadow-sm flex flex-col sm:flex-row items-start sm:items-center gap-3 md:gap-5 w-full md:w-auto">
                          <div className="bg-amber-400 text-amber-900 px-3 py-1 rounded-full font-bold text-sm whitespace-nowrap shadow-sm">🎯 目標</div>
                          <div className="flex flex-wrap gap-3 md:gap-4 text-base md:text-lg font-bold items-center text-slate-700">
                            <div>共有 <span className="text-2xl text-amber-600">{level.targetAnimals}</span> 隻動物</div>
                            <div className="hidden sm:block text-amber-300 font-black">|</div>
                            <div>共有 <span className="text-2xl text-red-600">{level.targetLegs}</span> 隻腳</div>
                          </div>
                        </div>
                        {!isWon && (
                          <div className="text-sm font-bold bg-slate-50 px-4 py-2 rounded-xl border border-slate-200">
                            {currentLegs < level.targetLegs ? <span className="text-blue-600">💡 腳太少了，需要換點兔子來！ (+2)</span> : ''}
                            {currentLegs > level.targetLegs ? <span className="text-red-500">💡 腳太多了，換點雞回來吧！ (-2)</span> : ''}
                          </div>
                        )}
                      </div>

                      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <div className={`p-5 rounded-2xl border-4 transition-colors duration-300 ${isWon ? 'bg-green-100 border-green-400' : 'bg-slate-50 border-slate-200'} flex flex-col`}>
                          <div className="text-slate-500 font-bold mb-4 flex items-center justify-center gap-2">👋 你的手牌與換牌區</div>
                          <div className="flex items-center justify-center gap-2 sm:gap-6 flex-grow">
                            <div className="bg-white p-3 sm:p-4 rounded-xl shadow-sm border-2 border-orange-200 w-24 sm:w-28 text-center flex-shrink-0 relative">
                              <div className="text-4xl sm:text-5xl mb-1">🐔</div>
                              <div className="font-bold text-orange-600 text-lg">{chickens} 隻</div>
                              <div className="text-xs text-slate-400 font-bold bg-slate-50 rounded mt-1">2 腳/隻</div>
                            </div>
                            {!isWon ? (
                              <div className="flex flex-col gap-3">
                                <button onClick={swapChickenForRabbit} disabled={chickens === 0} className="bg-teal-500 hover:bg-teal-400 disabled:opacity-50 disabled:cursor-not-allowed text-white px-2 py-2 rounded-xl font-bold shadow-sm transform transition active:scale-95 flex flex-col items-center justify-center border-b-4 border-teal-700 active:border-b-0 active:mt-1 whitespace-nowrap">
                                  <span className="text-xs mb-1 whitespace-nowrap">換兔 (+2腳)</span><span className="text-base tracking-widest">🐔➡️🐰</span>
                                </button>
                                <button onClick={swapRabbitForChicken} disabled={rabbits === 0} className="bg-orange-500 hover:bg-orange-400 disabled:opacity-50 disabled:cursor-not-allowed text-white px-2 py-2 rounded-xl font-bold shadow-sm transform transition active:scale-95 flex flex-col items-center justify-center border-b-4 border-orange-700 active:border-b-0 active:mt-1 whitespace-nowrap">
                                  <span className="text-base tracking-widest">🐰➡️🐔</span><span className="text-xs mt-1 whitespace-nowrap">換雞 (-2腳)</span>
                                </button>
                              </div>
                            ) : (
                              <div className="flex flex-col items-center justify-center text-green-600 px-2 sm:px-4">
                                <CheckCircle2 size={48} className="animate-pulse drop-shadow-md" />
                                <span className="font-black mt-2 text-lg">完美！</span>
                              </div>
                            )}
                            <div className="bg-white p-3 sm:p-4 rounded-xl shadow-sm border-2 border-teal-200 w-24 sm:w-28 text-center flex-shrink-0 relative">
                              <div className="text-4xl sm:text-5xl mb-1">🐰</div>
                              <div className="font-bold text-teal-600 text-lg">{rabbits} 隻</div>
                              <div className="text-xs text-slate-400 font-bold bg-slate-50 rounded mt-1">4 腳/隻</div>
                            </div>
                          </div>
                        </div>

                        <div className="bg-white p-5 rounded-2xl border-4 border-slate-200 shadow-inner flex flex-col justify-center overflow-hidden">
                          <div className="text-slate-500 font-bold mb-4 text-center">📝 算式紀錄與目前腳數</div>
                          <div className="flex flex-col items-center gap-4 w-full">
                            <div className="flex flex-nowrap justify-center items-center gap-1 sm:gap-2 text-base sm:text-2xl font-bold bg-slate-50 py-5 px-3 rounded-xl border border-slate-200 w-full overflow-x-auto whitespace-nowrap">
                              <span className="text-orange-600 bg-orange-50 px-2 py-1 rounded shadow-sm border border-orange-100">( {chickens} × 2 )</span>
                              <span className="text-slate-400">+</span>
                              <span className="text-teal-600 bg-teal-50 px-2 py-1 rounded shadow-sm border border-teal-100">( {rabbits} × 4 )</span>
                              <span className="text-slate-400">=</span>
                              <span className={`text-3xl sm:text-4xl px-2 font-black ${currentLegs === level.targetLegs ? 'text-green-600' : (currentLegs > level.targetLegs ? 'text-red-500' : 'text-blue-500')}`}>
                                {currentLegs}
                              </span>
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>

                    <div className="bg-slate-100 p-4 flex flex-wrap items-center justify-center gap-4 sm:gap-6 border-t border-slate-200 rounded-b-2xl transition-all">
                      <button onClick={() => setGameMode('tutorial')} className="text-blue-600 hover:text-blue-800 font-bold flex items-center justify-center gap-2 transition-colors bg-blue-50 px-5 py-2 rounded-full hover:bg-blue-100 border-2 border-blue-100 shadow-sm"><Hand size={18} /> 回到探索模式</button>
                      <button onClick={() => initLevel(currentLevelIndex)} className="text-slate-500 hover:text-slate-700 font-bold flex items-center justify-center gap-2 transition-colors bg-white px-5 py-2 rounded-full shadow-sm hover:bg-slate-50 border border-slate-200"><RefreshCcw size={18} /> 重新發牌</button>
                      {isWon && (
                        <div className="bg-green-500 text-white px-5 py-2 rounded-full flex items-center justify-center gap-4 shadow-lg animate-bounce border-2 border-green-400">
                          <div className="flex items-center gap-1"><CheckCircle2 size={20} /><span className="font-black text-sm sm:text-base">答對囉！</span></div>
                          <button onClick={nextLevel} className="bg-white text-green-600 px-4 py-1.5 rounded-full font-bold shadow-sm hover:bg-green-50 flex items-center gap-1 text-sm sm:text-base">
                            {currentLevelIndex < PLAY_LEVELS.length - 1 ? '挑戰下一關' : '進入終極測驗'} <ArrowRight size={16} />
                          </button>
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* === 測驗模式 (Test Mode) === */}
                {gameMode === 'test' && (
                  <div className="flex flex-col bg-white rounded-b-3xl">
                    <div className="p-6 md:p-10 space-y-8">
                      
                      {/* 題目區塊 */}
                      <div className="space-y-4">
                        <h2 className="text-2xl font-bold text-blue-800 flex items-center gap-2">
                          <BookOpen className="text-blue-500" /> {TEST_QUESTIONS[testLevel].title}
                        </h2>
                        <div className="bg-blue-50 p-6 rounded-2xl border-l-8 border-blue-400 shadow-sm text-lg sm:text-xl font-medium text-slate-700 leading-relaxed">
                          {TEST_QUESTIONS[testLevel].text}
                        </div>
                      </div>

                      {/* 作答區塊 (褪除圖示鷹架) */}
                      <div className="bg-slate-50 p-8 rounded-2xl border-2 border-slate-200 shadow-inner">
                        
                        {/* 題型一：算式填充 */}
                        {TEST_QUESTIONS[testLevel].type === 'equation' && (
                          <div className="flex flex-wrap justify-center items-center gap-2 text-xl sm:text-3xl font-black bg-white p-6 rounded-xl border-2 border-slate-100 shadow-sm">
                            <span className="text-orange-600 flex items-center gap-2">
                              ( <input type="number" min="0" value={testAns1} onChange={(e)=>setTestAns1(e.target.value)} className="w-16 sm:w-20 text-center border-b-4 border-orange-300 focus:outline-none focus:border-orange-500 bg-orange-50 rounded text-3xl p-1" placeholder="?" /> {TEST_QUESTIONS[testLevel].label1} × {TEST_QUESTIONS[testLevel].val1} )
                            </span>
                            <span className="text-slate-400">+</span>
                            <span className="text-teal-600 flex items-center gap-2">
                              ( <input type="number" min="0" value={testAns2} onChange={(e)=>setTestAns2(e.target.value)} className="w-16 sm:w-20 text-center border-b-4 border-teal-300 focus:outline-none focus:border-teal-500 bg-teal-50 rounded text-3xl p-1" placeholder="?" /> {TEST_QUESTIONS[testLevel].label2} × {TEST_QUESTIONS[testLevel].val2} )
                            </span>
                            <span className="text-slate-400">=</span>
                            <span className="text-slate-700 px-2">{TEST_QUESTIONS[testLevel].targetLegs}</span>
                          </div>
                        )}

                        {/* 題型二與三：純文字答案框 */}
                        {(TEST_QUESTIONS[testLevel].type === 'text' || TEST_QUESTIONS[testLevel].type === 'transfer') && (
                          <div className="flex flex-col sm:flex-row justify-center items-center gap-6">
                            <div className="bg-white px-8 py-6 rounded-xl shadow-sm border-2 border-orange-200 flex flex-col items-center gap-3">
                              <span className="text-2xl font-bold text-orange-700">{TEST_QUESTIONS[testLevel].icon1} {TEST_QUESTIONS[testLevel].label1}</span>
                              <div className="flex items-end gap-2 text-xl font-bold">
                                <input type="number" min="0" value={testAns1} onChange={(e)=>setTestAns1(e.target.value)} className="w-24 text-center border-b-4 border-orange-300 focus:outline-none focus:border-orange-500 bg-orange-50 rounded text-4xl p-2" placeholder="?" />
                                <span className="text-slate-500 mb-1">{TEST_QUESTIONS[testLevel].type === 'transfer' ? '輛' : '隻'}</span>
                              </div>
                            </div>
                            <div className="bg-white px-8 py-6 rounded-xl shadow-sm border-2 border-teal-200 flex flex-col items-center gap-3">
                              <span className="text-2xl font-bold text-teal-700">{TEST_QUESTIONS[testLevel].icon2} {TEST_QUESTIONS[testLevel].label2}</span>
                              <div className="flex items-end gap-2 text-xl font-bold">
                                <input type="number" min="0" value={testAns2} onChange={(e)=>setTestAns2(e.target.value)} className="w-24 text-center border-b-4 border-teal-300 focus:outline-none focus:border-teal-500 bg-teal-50 rounded text-4xl p-2" placeholder="?" />
                                <span className="text-slate-500 mb-1">{TEST_QUESTIONS[testLevel].type === 'transfer' ? '輛' : '隻'}</span>
                              </div>
                            </div>
                          </div>
                        )}
                        
                        {/* 錯誤回饋與救援機制 */}
                        {testErrorCount > 0 && (
                          <div className="mt-6 flex flex-col items-center animate-fade-in">
                            {testErrorCount === 1 ? (
                              <div className="bg-red-50 text-red-600 px-6 py-3 rounded-lg font-bold flex items-center gap-2 border border-red-200">
                                <AlertCircle /> 哎呀！數量或腳數好像不對喔，要不要再驗算一次算式？
                              </div>
                            ) : (
                              <div className="space-y-4 text-center w-full">
                                <div className="bg-orange-50 text-orange-700 px-6 py-3 rounded-lg font-bold inline-flex items-center gap-2 border border-orange-200">
                                  <AlertCircle /> 遇到困難了嗎？沒關係！
                                </div>
                                {!showScaffold && (
                                  <button onClick={() => setShowScaffold(true)} className="mx-auto bg-blue-500 hover:bg-blue-600 text-white px-6 py-3 rounded-full font-bold flex items-center gap-2 shadow-md transition-transform active:scale-95">
                                    <HelpCircle /> 呼叫救援：回農場排排看
                                  </button>
                                )}
                              </div>
                            )}
                          </div>
                        )}

                        {/* === 補救教學鷹架 (迷你換牌區) === */}
                        {showScaffold && (
                           <div className="mt-8 bg-white p-6 rounded-2xl border-4 border-blue-300 shadow-lg relative animate-fade-in">
                             <div className="absolute -top-4 left-1/2 -translate-x-1/2 bg-blue-500 text-white px-4 py-1 rounded-full font-bold text-sm shadow-sm flex items-center gap-1">
                               <HelpCircle size={16}/> 救援鷹架模式
                             </div>
                             <p className="text-center text-slate-500 font-bold mb-4">動手換換看，湊出 {TEST_QUESTIONS[testLevel].targetLegs} 個{TEST_QUESTIONS[testLevel].unit1}吧！</p>
                             
                             <div className="flex flex-col sm:flex-row justify-center items-center gap-4">
                                <div className="bg-orange-50 p-3 rounded-xl border-2 border-orange-200 text-center flex-1 w-full max-w-xs">
                                  <div className="text-3xl mb-1">{TEST_QUESTIONS[testLevel].icon1}</div>
                                  <div className="font-bold text-orange-700">{TEST_QUESTIONS[testLevel].label1} ({scaffoldVar1})</div>
                                </div>
                                
                                <div className="flex flex-col gap-2">
                                  <button onClick={scaffoldSwapToVar2} disabled={scaffoldVar1 === 0} className="bg-blue-100 hover:bg-blue-200 disabled:opacity-50 text-blue-700 px-4 py-1 rounded-lg font-bold border border-blue-300 text-sm">換 {TEST_QUESTIONS[testLevel].label2} (+{TEST_QUESTIONS[testLevel].val2 - TEST_QUESTIONS[testLevel].val1})</button>
                                  <button onClick={scaffoldSwapToVar1} disabled={scaffoldVar2 === 0} className="bg-blue-100 hover:bg-blue-200 disabled:opacity-50 text-blue-700 px-4 py-1 rounded-lg font-bold border border-blue-300 text-sm">換 {TEST_QUESTIONS[testLevel].label1} (-{TEST_QUESTIONS[testLevel].val2 - TEST_QUESTIONS[testLevel].val1})</button>
                                </div>

                                <div className="bg-teal-50 p-3 rounded-xl border-2 border-teal-200 text-center flex-1 w-full max-w-xs">
                                  <div className="text-3xl mb-1">{TEST_QUESTIONS[testLevel].icon2}</div>
                                  <div className="font-bold text-teal-700">{TEST_QUESTIONS[testLevel].label2} ({scaffoldVar2})</div>
                                </div>
                             </div>
                             
                             <div className="mt-4 text-center bg-slate-50 py-3 rounded-lg border border-slate-200 font-bold text-lg">
                               目前總數：<span className={scaffoldVar1 * TEST_QUESTIONS[testLevel].val1 + scaffoldVar2 * TEST_QUESTIONS[testLevel].val2 === TEST_QUESTIONS[testLevel].targetLegs ? "text-green-600 font-black text-2xl" : "text-blue-600 text-xl"}>{scaffoldVar1 * TEST_QUESTIONS[testLevel].val1 + scaffoldVar2 * TEST_QUESTIONS[testLevel].val2}</span>
                               <span className="text-slate-500 text-sm ml-1">/ 目標 {TEST_QUESTIONS[testLevel].targetLegs} {TEST_QUESTIONS[testLevel].unit1}</span>
                             </div>
                           </div>
                        )}
                      </div>
                    </div>

                    {/* 測驗模式底部操作區 */}
                    <div className="bg-blue-100 p-6 flex justify-center border-t border-blue-200 rounded-b-2xl">
                      <button onClick={submitTest} disabled={testAns1 === '' || testAns2 === ''} className="bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white px-10 py-4 rounded-full font-black text-xl shadow-lg transform transition active:scale-95 flex items-center gap-2">
                        交卷送出 <CheckCircle2 />
                      </button>
                    </div>
                  </div>
                )}

                {/* === 測驗全破畫面 === */}
                {gameMode === 'testComplete' && (
                  <div className="flex flex-col items-center justify-center p-12 bg-white rounded-b-3xl text-center space-y-6">
                    <Trophy size={100} className="text-yellow-400 drop-shadow-xl animate-bounce" />
                    <h2 className="text-4xl font-black text-slate-800">太厲害了！數學大師！</h2>
                    <p className="text-xl text-slate-600 max-w-md leading-relaxed">
                      你已經完全掌握了替換的方法，不論是雞兔同籠還是車輛輪子，都難不倒你了！
                    </p>
                    <button onClick={() => { setGameMode('tutorial'); setCurrentLevelIndex(0); }} className="mt-8 bg-gradient-to-r from-green-500 to-emerald-500 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:shadow-xl hover:scale-105 transition-all text-lg flex items-center gap-2">
                      <RefreshCcw /> 重新開始學習旅程
                    </button>
                  </div>
                )}

              </div>
            </div>
          );
        }

        // === 掛載至 DOM ===
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
